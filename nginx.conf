map $audible_region $audible_host {
  default "";
  au api.audible.com.au;
  br api.audible.com.br;
  ca api.audible.ca;
  de api.audible.de;
  es api.audible.es;
  fr api.audible.fr;
  in api.audible.in;
  it api.audible.it;
  jp api.audible.co.jp;
  uk api.audible.co.uk;
  us api.audible.com;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /index.html {
    add_header Cache-Control "no-store";
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location ~ ^/api/audible/(?<audible_region>au|br|ca|de|es|fr|in|it|jp|uk|us)(?<audible_path>/1\.0/catalog/products(?:/[^/?]+)?)$ {
    limit_except GET {
      deny all;
    }

    resolver 1.1.1.1 8.8.8.8 valid=300s;
    proxy_ssl_server_name on;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Accept "application/json";
    proxy_set_header Authorization "";
    proxy_set_header Cookie "";
    proxy_set_header Host $audible_host;
    proxy_set_header Origin "";
    proxy_set_header Referer "";
    proxy_set_header X-Api-Key "";
    proxy_set_header X-Forwarded-For "";
    proxy_set_header X-Forwarded-Host "";
    proxy_set_header X-Forwarded-Proto "";
    proxy_set_header X-Real-IP "";
    proxy_hide_header Set-Cookie;
    proxy_pass https://$audible_host$audible_path$is_args$args;
  }

  location ~ ^/api/apple-books(?<apple_books_path>/(?:search|lookup))$ {
    limit_except GET {
      deny all;
    }

    resolver 1.1.1.1 8.8.8.8 valid=300s;
    proxy_ssl_server_name on;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Accept "application/json";
    proxy_set_header Authorization "";
    proxy_set_header Cookie "";
    proxy_set_header Host itunes.apple.com;
    proxy_set_header Origin "";
    proxy_set_header Referer "";
    proxy_set_header X-Api-Key "";
    proxy_set_header X-Forwarded-For "";
    proxy_set_header X-Forwarded-Host "";
    proxy_set_header X-Forwarded-Proto "";
    proxy_set_header X-Real-IP "";
    proxy_hide_header Set-Cookie;
    proxy_pass https://itunes.apple.com$apple_books_path$is_args$args;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
